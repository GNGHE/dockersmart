name: Analyser le package

on:
  push:
    branches:
      - main

jobs:
  doctor:
    name: "Lancer la commande doctor"
    runs-on: ubuntu-24.04

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Installer le package
        run: pip install -e .

      - name: Analyser le package
        run: dockersmart doctor
