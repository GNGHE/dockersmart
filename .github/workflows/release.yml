name: Creer la release

on:
  workflow_run:
    workflows:
      - Créer un tag
    types:
      - completed


permissions:
  contents: write
jobs:
  version:
    name: Modifier la version du package
    runs-on: ubuntu-24.04
    steps:
      - name: 'Modifier la version'
        run: |
            git config user.name "gitops"
            git config user.email "gitops@gitops.com"
            yq eval -i '.version = "${{ github.ref_name }}"' pyproject.toml
            git add pyproject.toml
            git commit -m "Updating version for this package:
            Branch  : ${{github.head_ref}}
            Author  : ${{github.actor}}
            Message : Mis à jour de la version"
            git push
  release:
    name: Creer la release
    runs-on: ubuntu-24.04
    permissions:
      contents: write # Requis pour autoriser la création de la release
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Create GitHub Release Native
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Authentification